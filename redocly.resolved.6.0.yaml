  /individuals/business/property/foreign/{nino}/{businessId}/cumulative/{taxYear}:
    get:
      security:
        - User-Restricted:
            - read:self-assessment
      summary: Retrieve a Foreign Property Cumulative Period Summary
      description: |
        This endpoint enables you to retrieve the cumulative period income and expenses for a foreign property business. A National Insurance number, business ID, and tax year are required.

        <strong>Please note that this endpoint is only available for tax years starting from 2025-26</strong>.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        Tax Years               | Header Value (Gov-Test-Scenario) | Scenario                                                                 |
        |-----------------------|----------------------------------|--------------------------------------------------------------------------|
        | 2025-26 onwards       | N/A - DEFAULT                    | Simulates success response with Foreign Property.                        |
        | 2025-26 onwards       | NOT_FOUND                        | Simulates the scenario where no data is found.                           |
        | 2025-26 onwards       | TAX_YEAR_NOT_SUPPORTED           | Simulates the scenario where the tax year is not supported.              |
        | 2025-26 onwards       | FOREIGN_PROPERTY_FULL_EXPENSES   | Simulates success response of a Foreign property with full expenses.     |
        | 2025-26 onwards       | FOREIGN_PROPERTY_CONSOLIDATED    | Simulates the scenario of a Foreign property with consolidated expenses. |
        | 2025-26               | UK_PROPERTY                      | Simulates the scenario where the type of business is incorrect.          |
        | 2025-26 onwards       | STATEFUL                         | Performs a stateful retrieve.                                            |
      tags:
        - Income and Expenses Period Summaries
      parameters:
        - name: nino
          in: path
          description: National Insurance number, in the format `AA999999A`.
          schema: *ref_6
          required: true
        - name: businessId
          in: path
          description: |
            An identifier for the business, unique to the customer.<p>Must conform to the regular expression `^X[A-Z0-9]{1}IS[0-9]{11}$`
          schema: *ref_7
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. The start year and end year must not span two tax years.
            The minimum tax year is 2025-26. No gaps are allowed, for example, 2025-27 is not valid.
          schema: *ref_28
          required: true
        - name: propertyId
          in: query
          description: |
            A unique identifier for each foreign property.<strong> This parameter is only supported for tax years 2026-27 onwards.</strong>
          schema: &ref_58
            type: string
            format: uuid
            example: 8e8b8450-dc1b-4360-8109-7067337b42cb
          required: false
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_9
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: *ref_24
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_10
          required: false
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
            Deprecation:
              name: Deprecation
              in: header
              description: |
                The deprecation date/time for this endpoint.
              schema: *ref_1
              required: false
            Sunset:
              name: Sunset
              in: header
              description: |
                The earliest date/time this endpoint will become unavailable after deprecation.
              schema: *ref_2
              required: false
            Link:
              name: Link
              in: header
              description: |
                See the API documentation.
              schema: *ref_3
              required: false
          content:
            application/json:
              schema:
                oneOf:
                  - $schema: http://json-schema.org/draft-04/schema#
                    title: For TY 2025-26
                    type: object
                    properties:
                      submittedOn:
                        type: string
