      summary: Create and Amend a Historic FHL UK Property Business Annual Submission
      description: |
        This endpoint enables you to create and amend the income from adjustments and allowances for a furnished holiday lettings (FHL) UK property business for tax years from 2017-18 to 2021-22. A National Insurance number and tax year must be provided. Use this endpoint only for the specified tax year range; for current tax year submissions, use the Create and Amend a UK Property Business Annual Submission endpoint.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.


        | Header Value (Gov-Test-Scenario) | Scenario                                       |
        |----------------------------------|------------------------------------------------|
        | N/A - DEFAULT                    | Simulates a success response.                  |
        | NOT_FOUND                        | Simulates the scenario where no data is found. |
        | STATEFUL                         | Performs a stateful create or update.          |
      tags:
        - Historic Annual and Periodic Submissions
      parameters:
        - name: nino
          in: path
          description: National Insurance number, in the format `AA999999A`.
          schema: *ref_6
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. For example: 2022-23. The start year and end year must not span two tax years. The minimum tax year is 2022-23. No gaps are allowed, for example, 2022-24 is not valid. (The minimum tax year in Sandbox is 2021-22.)
          schema: *ref_8
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_9
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: *ref_20
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: *ref_21
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_10
          required: false
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-04/schema#
              title: Given any tax year
              type: object
              description: This endpoint enables you to create and amend the income from adjustments and allowances for a furnished holiday lettings (FHL) UK property business for tax years from 2017-18 to 2021-22. A National Insurance number and tax year must be provided. Use this endpoint only for the specified tax year range; for current tax year submissions, use the Create and Amend a UK Property Business Annual Submission endpoint.
              properties:
                annualAdjustments:
                  type: object
                  description: Object containing the details about annual adjustments.
                  properties:
                    lossBroughtForward:
                      type: number
                      description: Loss brought forward from earlier years. This value must be between  0 and 99999999999.99 up to 2 decimal places.
                      multipleOf: 0.01
                      minimum: 0
                      maximum: 99999999999.99
                      example: '5000.99'
                    privateUseAdjustment:
                      type: number
                      description: Private use adjustment on an asset by a sole trader or partner in a partnership, the asset is put in to a single-asset pool and allowances are restricted on the business to private-use ratio. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                      multipleOf: 0.01
                      minimum: 0
                      maximum: 99999999999.99
                      example: '5000.99'
                    balancingCharge:
                      type: number
                      description: Balancing charge on sale or cessation of business use (where you have disposed of assets for more than their tax value). The value must be between 0 and 99999999999.99 up to 2 decimal places.
                      multipleOf: 0.01
                      minimum: 0
                      maximum: 99999999999.99
                      example: '5000.99'
                    periodOfGraceAdjustment:
                      type: boolean
                      description: A boolean to identify a property which didn't qualify for FHL this year, but qualified the previous year. The value must be true or false
                      example: 'false'
                    businessPremisesRenovationAllowanceBalancingCharges:
                      type: number
                      description: Income from the sale or grant of a long lease for a premium of renovated business premises within 7 years of first use. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                      multipleOf: 0.01
                      minimum: 0
                      maximum: 99999999999.99
                      example: '5000.99'
                    nonResidentLandlord:
                      type: boolean
                      description: A boolean to identify that the user is a Non-Resident Landlord. The value must be true or false.
                      example: 'false'
                    rentARoom:
                      type: object
                      description: Object holding UK FHL Rent A Room income shared.
                      properties:
                        jointlyLet:
                          type: boolean
                          description: A boolean to identify that the Rent A Room income (RAR) is shared with another individual. The value must be true or false.
                          example: 'false'
                      additionalProperties: false
                      required:
                        - jointlyLet
                  additionalProperties: false
                  required:
                    - periodOfGraceAdjustment
                    - nonResidentLandlord
                annualAllowances:
                  type: object
                  description: Object containing the details about annual allowances
                  properties:
                    annualInvestmentAllowance:
                      type: number
                      description: The amount claimed on equipment bought (except cars) up to maximum annual amount. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                      multipleOf: 0.01
                      minimum: 0
                      maximum: 99999999999.99
                      example: '5000.99'
                    businessPremisesRenovationAllowance:
                      type: number
                      description: The allowance amount for renovation or conversion of derelict business properties. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                      multipleOf: 0.01
                      minimum: 0
                      maximum: 99999999999.99
                      example: '5000.99'
                    otherCapitalAllowance:
                      type: number
                      description: All other capital allowances. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                      multipleOf: 0.01
                      minimum: 0
                      maximum: 99999999999.99
                      example: '5000.99'
                    propertyIncomeAllowance:
                      type: number
                      description: The amount of tax exemption for individuals with income from land or property. The value must be between 0 and 1000.00 up to 2 decimal places.
                      multipleOf: 0.01
                      minimum: 0
                      maximum: 99999999999.99
                      example: '5000.99'
                  additionalProperties: false
              additionalProperties: false
            examples:
              property-allowance-request:
                description: Property Allowance request given any tax year
                value:
                  $ref: ./examples/historic_uk_fhl_annual_submission_create_and_amend/def1/request.json
