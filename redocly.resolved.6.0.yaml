                            multipleOf: 0.01
                            minimum: -99999999999.99
                            maximum: 99999999999.99
                            example: '5000.99'
                          other:
                            type: number
                            description: Other allowable property expenses. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places.
                            multipleOf: 0.01
                            minimum: -99999999999.99
                            maximum: 99999999999.99
                            example: '5000.99'
