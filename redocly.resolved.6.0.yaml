openapi: 3.0.3
info:
  version: '6.0'
  title: Property Business (MTD)
  description: |

    The following groups of endpoints are stateful in the Sandbox:

    -  [UK Property Business Annual Submission](#tag/UK-Property-Business-Annual-Submission)
    -  [UK Property Income and Expenses Period Summary](#tag/UK-Property-Income-and-Expenses-Period-Summary)
    -  [Historic FHL UK Property Business Annual Submission](#tag/Historic-FHL-UK-Property-Business-Annual-Submission)
    -  [Historic non-FHL UK Property Business Annual Submission](#tag/Historic-non-FHL-UK-Property-Business-Annual-Submission)
    -  [Historic FHL UK Property Income and Expenses Period Summary](#tag/Historic-FHL-UK-Property-Income-and-Expenses-Period-Summary)
    -  [Historic non-FHL UK Property Income and Expenses Period Summary](#tag/Historic-non-FHL-UK-Property-Income-and-Expenses-Period-Summary)
    -  [Foreign Property Income and Expenses Period Summary](#tag/Foreign-Property-Income-and-Expenses-Period-Summary)
    -  [Foreign Property Annual Submission](#tag/Foreign-Property-Annual-Submission)
    -  [Foreign Property Details](#tag/Foreign-Property-Details)

    # Send fraud prevention data
    HMRC monitors transactions to help protect your customers' confidential data from criminals and fraudsters. 

    <div class="govuk-warning-text warning-icon-fix">
      <span class="govuk-warning-text__icon warning-icon-ui-fix" aria-hidden="true">!</span>
      <strong class="govuk-warning-text__text">
        <span class="govuk-warning-text__assistive">Warning</span>
        You are required by law to submit header data for this API. This includes all associated APIs and endpoints.
      </strong>
    </div>

    [Check the data you need to send](/guides/fraud-prevention/). You can also use the [Test API](/api-documentation/docs/api/service/txm-fph-validator-api/1.0) during initial development and as part of your quality assurance checks.

    # Mapping APIs to Self Assessment tax return forms
    Some parameters in this API map to box numbers in one or more Self Assessment tax return forms. To learn more and to download this mapping information as a CSV file, go to [income-tax-mtd-changelog/mapping](https://github.com/hmrc/income-tax-mtd-changelog?tab=readme-ov-file#mapping-apis-to-self-assessment-tax-return-forms) on GitHub.

    # Changelog
    You can find the changelog in the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/#readme) on GitHub.

    # Support
    * Direct reports of bugs or errors in Production or Sandbox code, or queries about HMRC business functionality (such as how a specific field is used by HMRC or why it is needed) to the [Software Development Support Team (SDST)](https://developer.service.hmrc.gov.uk/developer/support).
    * Send queries or feedback related to the design of the APIs (including recommended changes) using the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/issues) GitHub page.
    * <a href="/contact/report-technical-problem?newTab=true&service=api-documentation-frontend" target="_blank">Is this page not working properly? (opens in new tab)</a>

    # Testing
    You can use the sandbox environment to <a href="/api-documentation/docs/testing">test this API</a>. You can use the <a href="/api-documentation/docs/api/service/api-platform-test-user/1.0">Create Test User API</a> or its frontend service to create test users.

    It may not be possible to test all scenarios in the sandbox. You can test some scenarios by passing the `Gov-Test-Scenario` header. Documentation for each endpoint includes a **Test data** section, which explains the scenarios that you can simulate using the `Gov-Test-Scenario` header.

    If you have a specific testing need that is not supported in the sandbox, contact <a href="/developer/support">our support team</a>.

    Some APIs may be marked \[test only\]. This means that they are not available for use in production and may change.
servers:
  - url: https://test-api.service.hmrc.gov.uk
    description: Sandbox
  - url: https://api.service.hmrc.gov.uk
    description: Production
tags:
  - name: Annual Submissions
    description: Resources relating to Annual Submissions
  - name: Income and Expenses Period Summaries
    description: Resources relating to Income and Expenses Period Summaries (including cumulative and List periods)
  - name: Historic Annual and Periodic Submissions
    description: Resources relating to Historic Annual and Periodic Submissions
  - name: Foreign Property Details
    description: Resources relating to Foreign Property Details
paths:
  /individuals/business/property/uk/{nino}/{businessId}/annual/{taxYear}:
    get:
      security:
        - User-Restricted:
            - read:self-assessment
      summary: Retrieve a UK Property Business Annual Submission
      description: |
        This endpoint allows a developer to retrieve adjustments and allowances for a UK property business. For either or both of Furnished Holiday Letting (FHL) or other UK property submissions. A National Insurance number, business ID and tax year are required.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario)      | Scenario                                                               |
        |---------------------------------------|------------------------------------------------------------------------|
        | N/A - DEFAULT                         | Simulates the scenario where no data is found.                         |
        | UK_PROPERTY                           | Simulates the scenario with UK properties.                             |
        | UK_ALL_OTHER_ALLOWANCES               | Simulates the scenario of a UK property with all other allowances.     |
        | UK_PROPERTY_ALLOWANCE                 | Simulates the scenario of a UK property with property allowance.       |
        | UK_FHL_ALL_OTHER_ALLOWANCES           | Simulates the scenario of a FHL property with all other allowances.    |
        | UK_FHL_PROPERTY_ALLOWANCE             | Simulates the scenario of a FHL property with property allowance.      |
        | FOREIGN_PROPERTY                      | Simulates the scenario where the type of business is incorrect.        |
        | STATEFUL                              | Performs a stateful retrieve.                                          |
      tags:
        - Annual Submissions
      parameters:
        - name: nino
          in: path
          description: National Insurance number, in the format `AA999999A`.
          schema: &ref_6
            type: string
            example: TC663795B
          required: true
        - name: businessId
          in: path
          description: |
            An identifier for the business, unique to the customer.<p>Must conform to the regular expression `^X[A-Z0-9]{1}IS[0-9]{11}$`
          schema: &ref_7
            type: string
            pattern: ^X[A-Z0-9]{1}IS[0-9]{11}$
            example: XAIS12345678910
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. For example: 2022-23. The start year and end year must not span two tax years. The minimum tax year is 2022-23. No gaps are allowed, for example, 2022-24 is not valid. (The minimum tax year in Sandbox is 2021-22.)
          schema: &ref_8
            type: string
            example: 2022-23
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: &ref_9
            type: string
            enum:
              - application/vnd.hmrc.6.0+json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: &ref_24
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: &ref_10
            type: string
            example: '-'
          required: false
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: &ref_0
                type: string
                example: c75f40a6-a3df-4429-a697-471eeec46435
              required: true
            Deprecation:
              name: Deprecation
              in: header
              description: |
                The deprecation date/time for this endpoint.
              schema: &ref_1
                type: string
                example: Sun, 01 Jan 2023 23:59:59 UTC
              required: false
            Sunset:
              name: Sunset
              in: header
              description: |
                The earliest date/time this endpoint will become unavailable after deprecation.
              schema: &ref_2
                type: string
                example: Sun, 02 Jul 2023 23:59:59 UTC
              required: false
            Link:
              name: Link
              in: header
              description: |
                See the API documentation.
              schema: &ref_3
                type: string
                example: https://developer.service.hmrc.gov.uk/api-documentation/docs/api/service/property-business-api
              required: false
          content:
            application/json:
              schema:
                oneOf:
                  - $schema: http://json-schema.org/draft-04/schema#
                    title: Tax Years before 2025-26
                    type: object
                    description: This endpoint allows a developer to retrieve adjustments and allowances for a UK property business. For either or both of Furnished Holiday Letting (FHL) or other UK property submissions. A National Insurance number, business ID and tax year are required.
                    properties:
                      submittedOn:
                        type: string
                        format: date-time
                        description: The date the UK property was submitted, in the format `YYYY-MM-DDThh:mm:ss.SSSZ`
                        example: '2020-07-07T10:59:47.544Z'
                      ukFhlProperty:
                        type: object
                        description: Object holding the adjustments and allowances of the user's Furnished Holiday Letting (FHL) in the United Kingdom.
                        properties:
                          adjustments:
                            type: object
                            description: Object holding UK FHL Property Adjustments.
                            properties:
                              privateUseAdjustment:
                                type: number
                                description: Any adjustments that are not solely for the property business. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                                example: '5000.99'
                              balancingCharge:
                                type: number
                                description: If an item for which capital allowance was claimed has been sold, given away or is no longer in use. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                                example: '5000.99'
                              periodOfGraceAdjustment:
                                type: boolean
                                description: A boolean to identify a property which didn't qualify for FHL this year, but qualified the previous year. The value must be true or false.
                                example: 'true'
                              businessPremisesRenovationAllowanceBalancingCharges:
                                type: number
                                description: Income from the sale or grant of a long lease for a premium of renovated business premises within 7 years of first use. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                                example: '5000.99'
                              nonResidentLandlord:
                                type: boolean
                                description: A boolean to identify that the user is a Non-Resident Landlord. The value must be true or false.
                                example: 'false'
                              rentARoom:
                                type: object
                                description: Object holding UK FHL Rent A Room income shared.
                                properties:
                                  jointlyLet:
                                    type: boolean
                                    description: A boolean to identify that the Rent A Room income (RAR) is shared with another individual. The value must be true or false.
                                    example: 'true'
                                required:
                                  - jointlyLet
                            additionalProperties: false
                            required:
                              - nonResidentLandlord
                              - periodOfGraceAdjustment
                          allowances:
                            type: object
                            description: Object holding other and property allowances details.
                            properties:
                              annualInvestmentAllowance:
                                type: number
                                description: The amount claimed on equipment bought (except cars) up to maximum annual amount. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                                example: '5000.99'
                              businessPremisesRenovationAllowance:
                                type: number
                                description: The allowance amount for renovation or conversion of derelict business properties. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                                example: '5000.99'
                              otherCapitalAllowance:
                                type: number
                                description: All other capital allowances. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                                example: '5000.99'
                              propertyIncomeAllowance:
                                type: number
                                description: The amount of tax exemption for individuals with income from land or property. The value must be between 0 and 1000.00 up to 2 decimal places.
                                minimum: 0
                                maximum: 1000
                                multipleOf: 0.01
                                example: '100.25'
                              electricChargePointAllowance:
                                type: number
                                description: The expenditure incurred on electric charge-point equipment. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                                example: '5000.99'
                              zeroEmissionsCarAllowance:
                                type: number
                                description: The amount of zero emissions car allowance. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                                example: '5000.99'
                            additionalProperties: false
                        additionalProperties: false
                      ukProperty:
                        type: object
                        description: Object holding allowances and adjustments for UK property business - excluding Furnished Holiday Lettings (FHL) for the period.
                        properties:
                          adjustments:
                            type: object
                            description: Object holding UK Non FHL Property annual adjustments.
                            properties:
