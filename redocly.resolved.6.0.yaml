      summary: Create or Amend a UK Property Cumulative Period Summary
      description: "This endpoint enables you to submit the cumulative period income and expenses for a UK property business that occurred between two dates. A National Insurance number, tax year and business ID are required.\n\n<strong>Please note that this endpoint is only available for tax years starting from 2025-26</strong>.\n\n### Test data\nScenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.\n\n| Header Value (Gov_test-Scenario)            | Scenario                                                                                            |\n|---------------------------------------------|-----------------------------------------------------------------------------------------------------|\n| N/A - DEFAULT                               | Simulates success response.                                                                         |\n| NOT_FOUND                                   | Simulates the scenario where no data is found.                                                      |\n| TAX_YEAR_NOT_SUPPORTED                      | Simulates the scenario where the tax year is not supported.                                         |\n| STATEFUL                                    | Performs a stateful create or update based on a user’s ITSA status and income source. Both <strong>standard</strong> and <strong>calendar</strong> updates are supported.<br/></br>For these submissions, a UK test business must be created using the <strong>Create a Test Business</strong> endpoint in the [Self Assessment Test Support API](/api-documentation/docs/api/service/mtd-sa-test-support-api).<br/></br>For <strong>annual</strong> or <strong>latent</strong> submissions:<ul><li>A test business with a latency end date that falls within the requested tax year can be created using the <strong>Create a Test Business</strong> endpoint.</li><li>An annual ITSA status for a customer can be created using the <strong>Create and Amend Test ITSA Status</strong> endpoint.</li></ul><strong>Note: Most business validation rule errors can be triggered, however due to testing limitations some edge cases are not supported.</strong>| \n| START_DATE_NOT_ALIGNED_TO_COMMENCEMENT_DATE | Simulates the scenario where the start date does not align to the commencement date.                |\n| END_DATE_NOT_ALIGNED_WITH_REPORTING_TYPE    | Simulates the scenario where the end date does not align to the reporting type.                     |\n| MISSING_SUBMISSION_DATES                    | Simulates the scenario where the submission start/end date not provided.\t                          |\n| START_AND_END_DATE_NOT_ALLOWED              | Simulates the scenario where the start/end date not accepted for annual/latent submission.          |\n| EARLY_DATA_SUBMISSION_NOT_ACCEPTED          | Simulates the scenario where individuals cannot submit data more than 10 days before end of period. |\n| OUTSIDE_AMENDMENT_WINDOW                    | Simulates the scenario where request cannot be completed as it is outside the amendment window.     |\n| ADVANCE_SUBMISSION_REQUIRES_PERIOD_END_DATE | Simulates the scenario for advance submission where the end date must be the end of the period.     |\n| SUBMISSION_END_DATE_CANNOT_MOVE_BACKWARDS   | Simulates the scenario where the submission end date cannot be earlier than existing submission.    |\n| START_DATE_NOT_ALIGNED_WITH_REPORTING_TYPE  | Simulates the scenario where the start date does not align with the reporting type.                 |\n"
      tags:
        - Income and Expenses Period Summaries
      parameters:
        - name: nino
          in: path
          description: National Insurance number, in the format `AA999999A`.
          schema: *ref_6
          required: true
        - name: businessId
          in: path
          description: |
            An identifier for the business, unique to the customer.<p>Must conform to the regular expression `^X[A-Z0-9]{1}IS[0-9]{11}$`
          schema: *ref_7
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. The start year and end year must not span two tax years.
            The minimum tax year is 2025-26. No gaps are allowed, for example, 2025-27 is not valid.
          schema: *ref_28
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_9
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: *ref_20
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: *ref_21
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_10
          required: false
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-04/schema#
              title: For TY 2025-26 and after
              type: object
              properties:
                fromDate:
                  description: |-
                    The first day that the income and expenses period summary covers. Must conform to the format: YYYY-MM-DD.

                    For users with ITSA status of 'annual' or a latent income source, these dates are not required.
                  type: string
                  example: '2025-04-06'
                  format: date
                toDate:
                  description: |-
                    The last day that the income and expenses period summary covers. Must conform to the format: YYYY-MM-DD.

                    For users with ITSA status of 'annual' or a latent income source, these dates are not required.
                  type: string
                  example: '2025-07-05'
                  format: date
                ukProperty:
                  description: Object holding the income and expenses of the UK property business.
                  type: object
                  properties:
                    income:
                      description: Object holding the income details for the period.
                      type: object
                      properties:
                        premiumsOfLeaseGrant:
                          description: Premiums received for the grant of a lease and other lump sums to possess a property. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                          example: '5000.99'
                        reversePremiums:
                          description: Amount paid by a landlord or outgoing tenant to induce a new tenant to enter into a leasehold agreement. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                          example: '5000.99'
                        periodAmount:
                          description: Total rents from property (but not ground rents, rent charges and rent-a-room rental income). The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                          example: '5000.99'
                        taxDeducted:
                          description: Tax already deducted from the rental income. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                          example: '5000.99'
                        otherIncome:
                          description: Total amount of rent and any income for services provided to tenants. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                          example: '5000.99'
                        rentARoom:
                          description: Object holding the rents received for the period.
                          type: object
                          properties:
                            rentsReceived:
                              description: Total rents received from properties. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              type: number
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '5000.99'
                          additionalProperties: false
                      additionalProperties: false
                    expenses:
                      description: Object holding the expenses for the period.
                      type: object
                      properties:
                        premisesRunningCosts:
                          description: Rent, rates, insurance, ground rents and other costs. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places.
                          type: number
                          multipleOf: 0.01
                          minimum: -99999999999.99
                          maximum: 99999999999.99
                          example: '5000.99'
                        repairsAndMaintenance:
                          description: Property repairs and maintenance. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places.
                          type: number
                          multipleOf: 0.01
                          minimum: -99999999999.99
                          maximum: 99999999999.99
                          example: '5000.99'
                        financialCosts:
                          description: Loan interest and other financial costs. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places.
                          type: number
                          multipleOf: 0.01
                          minimum: -99999999999.99
                          maximum: 99999999999.99
                          example: '5000.99'
                        professionalFees:
                          description: Legal, management and other professional fees. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places.
                          type: number
                          multipleOf: 0.01
                          minimum: -99999999999.99
                          maximum: 99999999999.99
                          example: '5000.99'
                        costOfServices:
                          description: Cost of services provided, including wages. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places.
                          type: number
                          multipleOf: 0.01
                          minimum: -99999999999.99
                          maximum: 99999999999.99
                          example: '5000.99'
                        other:
                          description: Other allowable property expenses. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places.
                          type: number
                          multipleOf: 0.01
                          minimum: -99999999999.99
                          maximum: 99999999999.99
                          example: '5000.99'
                        residentialFinancialCost:
                          description: The residential financial cost deductible from rental income (tax relief). The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                          example: '5000.99'
                        travelCosts:
                          description: Car, van and travel costs incurred in running a property business. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places.
                          type: number
                          multipleOf: 0.01
                          minimum: -99999999999.99
                          maximum: 99999999999.99
                          example: '5000.99'
                        residentialFinancialCostsCarriedForward:
                          description: Amount of residential financial costs carried forward. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                          example: '5000.99'
                        rentARoom:
                          description: Object holding the amount claimed for the period.
                          type: object
                          properties:
                            amountClaimed:
                              description: The amount of UK Furnished Holiday Lettings rent claimed. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              type: number
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '5000.99'
                          additionalProperties: false
                        consolidatedExpenses:
                          description: The sum of all allowable expenses for the specified period. Can be submitted with residentialFinancialCost, residentialFinancialCostsCarriedForward and rentARoom for tax year 2025-26. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places.
                          type: number
                          multipleOf: 0.01
                          minimum: -99999999999.99
                          maximum: 99999999999.99
                          example: '5000.99'
                      additionalProperties: false
                  additionalProperties: false
              required:
                - ukProperty
              additionalProperties: false
            examples:
              Full expenses request for TY 2025-26 and after:
                value:
                  $ref: ./examples/uk_property_cumulative_summary_create_and_amend/def1/request.json
              Consolidated expenses request for TY 2025-26 and after:
                value:
                  $ref: ./examples/uk_property_cumulative_summary_create_and_amend/def1/consolidated_request.json
      responses:
