    put:
      security:
        - User-Restricted:
            - write:self-assessment
      summary: Create or Amend a Foreign Property Cumulative Period Summary
      description: "This endpoint enables you to submit the cumulative period income and expenses between two dates for a foreign property business. \nA National Insurance number, tax year and business ID are required. \n\n<strong>Please note that this endpoint is only available for tax years starting from 2025-26</strong>.\n\n### Test data\nScenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.\n\n|Tax Year         | Header Value (Gov_test-Scenario)            | Scenario                                                                                                  |\n|-----------------|---------------------------------------------|-----------------------------------------------------------------------------------------------------------|\n| 2025-26 onwards | N/A - DEFAULT                               | Simulates success response.                                                                               |\n| 2025-26 onwards | NOT_FOUND                                   | Simulates the scenario where no data is found.                                                            |\n| 2025-26 onwards | TAX_YEAR_NOT_SUPPORTED                      | Simulates the scenario where the tax year is not supported.                                               |\n| 2025-26 onwards | STATEFUL                                    | Performs a stateful create or update based on a user’s ITSA status and income source. Both <strong>standard</strong> and <strong>calendar</strong> updates are supported.<br/></br>For these submissions, a foreign test business must be created using the <strong>Create a Test Business</strong> endpoint in the [Self Assessment Test Support API](/api-documentation/docs/api/service/mtd-sa-test-support-api).<br/></br>For <strong>annual</strong> or <strong>latent</strong> submissions:<ul><li>A test business with a latency end date that falls within the requested tax year can be created using the <strong>Create a Test Business</strong> endpoint.</li><li>An annual ITSA status for a customer can be created using the <strong>Create and Amend Test ITSA Status</strong> endpoint.</li></ul><strong>Note: Most business validation rule errors can be triggered, however due to testing limitations some edge cases are not supported.</strong>| \n| 2025-26 onwards | START_DATE_NOT_ALIGNED_TO_COMMENCEMENT_DATE | Simulates the scenario where the start date does not align to the commencement date.                      |\n| 2025-26 onwards | END_DATE_NOT_ALIGNED_WITH_REPORTING_TYPE    | Simulates the scenario where the end date does not align to the reporting type.                           |\n| 2025-26 onwards | MISSING_SUBMISSION_DATES                    | Simulates the scenario where the submission start/end date not provided.\t                              |\n| 2025-26 onwards | START_AND_END_DATE_NOT_ALLOWED              | Simulates the scenario where the start/end date not accepted for annual/latent submission.                |\n| 2025-26 onwards | EARLY_DATA_SUBMISSION_NOT_ACCEPTED          | Simulates the scenario where individuals cannot submit data more than 10 days before end of period.       |\n| 2025-26 onwards | OUTSIDE_AMENDMENT_WINDOW                    | Simulates the scenario where request cannot be completed as it is outside the amendment window.           |\n| 2025-26 onwards | ADVANCE_SUBMISSION_REQUIRES_PERIOD_END_DATE | Simulates the scenario for advance submission where the end date must be the end of the period.           |\n| 2025-26 onwards | SUBMISSION_END_DATE_CANNOT_MOVE_BACKWARDS   | Simulates the scenario where the submission end date cannot be earlier than existing submission.          |\n| 2025-26 onwards | START_DATE_NOT_ALIGNED_WITH_REPORTING_TYPE  | Simulates the scenario where the start date does not align with the reporting type.                       |\n| 2026-27 onwards | PROPERTY_ID_MISMATCH                        | Simulates the scenario where the supplied property ID is not associated with the income source on record. |\n"
      tags:
        - Income and Expenses Period Summaries
      parameters:
        - name: nino
          in: path
          description: National Insurance number, in the format `AA999999A`.
          schema: *ref_6
          required: true
        - name: businessId
          in: path
          description: |
            An identifier for the business, unique to the customer.<p>Must conform to the regular expression `^X[A-Z0-9]{1}IS[0-9]{11}$`
          schema: *ref_7
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. The start year and end year must not span two tax years.
            The minimum tax year is 2025-26. No gaps are allowed, for example, 2025-27 is not valid.
          schema: *ref_28
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_9
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: *ref_20
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: *ref_21
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_10
          required: false
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
