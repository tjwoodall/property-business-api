    put:
      security:
        - User-Restricted:
            - write:self-assessment
      summary: Create and Amend a UK Property Business Annual Submission
      description: |
        This endpoint enables you to re-submit adjustments and allowances for a UK property business, either furnished holiday lettings (FHL) or non-FHL or both. 
        A National Insurance number, business ID and tax year are required.

        Note: For tax years before 2025-26, data can be submitted for either a UK FHL or UK Non-FHL property. 
        From tax year 2025-26 onwards, the UK FHL and UK Non-FHL property types are no longer valid and you must use the UK property type.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario)      | Scenario                                                                                                     |
        |---------------------------------------|--------------------------------------------------------------------------------------------------------------|
        | N/A - DEFAULT                         | Simulates success response.                                                                                  |
        | NOT_FOUND                             | Simulates the scenario where no data is found.                                                               |
        | TYPE_OF_BUSINESS_INCORRECT            | Simulates the scenario where a businessId for something other than a UK property is supplied.                |
        | PROPERTY_INCOME_ALLOWANCE             | Simulates the scenario where the propertyIncomeAllowance is submitted when privateUseAdjustment is supplied. |
        | STATEFUL                              | Performs a stateful create or update.                                                                        |
        | OUTSIDE_AMENDMENT_WINDOW              | Simulates the scenario where request cannot be completed as it is outside the amendment window.              |
      tags:
        - Annual Submissions
      parameters:
        - name: nino
          in: path
          description: National Insurance number, in the format `AA999999A`.
          schema: *ref_6
          required: true
        - name: businessId
          in: path
          description: |
            An identifier for the business, unique to the customer.<p>Must conform to the regular expression `^X[A-Z0-9]{1}IS[0-9]{11}$`
          schema: *ref_7
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. For example: 2022-23. The start year and end year must not span two tax years. The minimum tax year is 2022-23. No gaps are allowed, for example, 2022-24 is not valid. (The minimum tax year in Sandbox is 2021-22.)
          schema: *ref_8
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_9
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: &ref_20
            type: string
            enum:
              - application/json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: &ref_21
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_10
          required: false
