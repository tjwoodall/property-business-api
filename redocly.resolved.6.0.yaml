    get:
      security:
        - User-Restricted:
            - read:self-assessment
      summary: Retrieve a UK Property Cumulative Period Summary
      description: |
        This endpoint enables you to retrieve the cumulative period income and expenses for a UK property business. A National Insurance number, business ID, and tax year are required.

        <strong>Please note that this endpoint is only available for tax years starting from 2025-26</strong>.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                                        |
        |----------------------------------|-----------------------------------------------------------------|
        | N/A - DEFAULT                    | Simulates success response with UK Property.                    |
        | NOT_FOUND                        | Simulates the scenario where no data is found.                  |
        | TAX_YEAR_NOT_SUPPORTED           | Simulates the scenario where the tax year is not supported.     |
        | UK_PROPERTY_CONSOLIDATED         | Simulates the scenario with consolidated expenses.              |
        | UK_PROPERTY_FULL_EXPENSES        | Simulates success response with full expenses.                  |
        | FOREIGN_PROPERTY                 | Simulates the scenario where the type of business is incorrect. |
        | STATEFUL                         | Performs a stateful retrieve.                                   |
      tags:
        - Income and Expenses Period Summaries
      parameters:
        - name: nino
          in: path
          description: National Insurance number, in the format `AA999999A`.
          schema: *ref_6
          required: true
        - name: businessId
          in: path
          description: |
            An identifier for the business, unique to the customer.<p>Must conform to the regular expression `^X[A-Z0-9]{1}IS[0-9]{11}$`
          schema: *ref_7
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. The start year and end year must not span two tax years.
            The minimum tax year is 2025-26. No gaps are allowed, for example, 2025-27 is not valid.
          schema: &ref_28
            type: string
            example: 2025-26
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_9
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: *ref_24
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_10
          required: false
