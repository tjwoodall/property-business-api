  /individuals/business/property/foreign/{nino}/{businessId}/annual/{taxYear}:
    get:
      security:
        - User-Restricted:
            - read:self-assessment
      summary: Retrieve a Foreign Property Annual Submission
      description: |
        This endpoint enables you to retrieve adjustments and allowances for a foreign property business, for either or both of Furnished Holiday Letting (FHL) in the European Economic Area (EEA) and Non-FHL Foreign property submissions. 
        A National Insurance number, business ID and tax year are required.

        Note: For tax years before 2025-26, data can be submitted for either a Foreign FHL-EEA or Non-FHL property. From tax year 2025-26 onwards, the Foreign FHL-EEA and Non-FHL property types are no longer valid and you must use the Foreign property type.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Tax Year       | Header Value (Gov-Test-Scenario)      | Scenario                                                               |
        |----------------|---------------------------------------|------------------------------------------------------------------------|
        | All            | N/A - DEFAULT                         | Simulates the scenario where no data is found.                         |
        | All            | FOREIGN_PROPERTY                      | Simulates the scenario with Foreign properties.                        |
        | All            | FOREIGN_ALL_OTHER_ALLOWANCES          | Simulates the scenario of a Foreign property with all other allowances.|
        | All            | FOREIGN_PROPERTY_ALLOWANCE            | Simulates the scenario of a Foreign property with property allowance.  |
        | Before 2025-26 | FOREIGN_FHL_ALL_OTHER_ALLOWANCES      | Simulates the scenario of a FHL property with all other allowances.    |
        | Before 2025-26 | FOREIGN_FHL_PROPERTY_ALLOWANCE        | Simulates the scenario of a FHL property with property allowance.      |
        | Before 2026-27 | UK_PROPERTY                           | Simulates the scenario where the type of business is incorrect.        |
        | All            | STATEFUL                              | Performs a stateful retrieve.                                          |
      tags:
        - Annual Submissions
      parameters:
        - name: nino
          in: path
          description: National Insurance number, in the format `AA999999A`.
          schema: *ref_6
          required: true
        - name: businessId
          in: path
          description: |
            An identifier for the business, unique to the customer.<p>Must conform to the regular expression `^X[A-Z0-9]{1}IS[0-9]{11}$`
          schema: *ref_7
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. For example: 2022-23. The start year and end year must not span two tax years. The minimum tax year is 2022-23. No gaps are allowed, for example, 2022-24 is not valid. (The minimum tax year in Sandbox is 2021-22.)
          schema: *ref_8
          required: true
        - name: propertyId
          in: query
          description: |
            A unique identifier for each foreign property.<strong> This parameter is only supported for tax years 2026-27 onwards.</strong>
          schema: *ref_58
          required: false
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_9
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: *ref_24
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_10
          required: false
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
            Deprecation:
              name: Deprecation
              in: header
              description: |
                The deprecation date/time for this endpoint.
              schema: *ref_1
              required: false
            Sunset:
              name: Sunset
              in: header
              description: |
                The earliest date/time this endpoint will become unavailable after deprecation.
              schema: *ref_2
              required: false
            Link:
              name: Link
              in: header
              description: |
                See the API documentation.
              schema: *ref_3
              required: false
          content:
            application/json:
              schema:
                oneOf:
                  - $schema: http://json-schema.org/draft-04/schema#
                    title: For TY 2024-25 and before
                    type: object
                    properties:
                      submittedOn:
                        type: string
                        format: date-time
                        description: The date the foreign property was submitted, in the format `YYYY-MM-DDThh:mm:ss.SSSZ`
                        example: '2022-06-17T10:59:47.544Z'
                      foreignFhlEea:
                        type: object
                        description: Object holding the adjustments and allowances of the user's Furnished Holiday Lets in the European Economic Area for the period.
                        properties:
                          adjustments:
                            type: object
                            description: Object holding Foreign FHL EEA Property Adjustments.
                            properties:
                              privateUseAdjustment:
                                type: number
                                description: Any adjustments that are not solely for the property business. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                                example: '5000.99'
                              balancingCharge:
                                type: number
                                description: If an item for which capital allowance was claimed has been sold, given away or is no longer in use. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                                example: '5000.99'
                              periodOfGraceAdjustment:
                                type: boolean
                                description: A boolean to identify a property which didn't qualify for FHL this year, but qualified the previous year. The value must be true or false.
                                example: 'true'
                            additionalProperties: false
                          allowances:
                            type: object
                            description: Object holding other and property allowances details.
                            properties:
                              annualInvestmentAllowance:
                                type: number
                                description: The amount claimed on equipment bought (except cars) up to maximum annual amount. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                                example: '5000.99'
                              otherCapitalAllowance:
                                type: number
                                description: All other capital allowances. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                                example: '5000.99'
                              electricChargePointAllowance:
                                type: number
                                description: The expenditure incurred on electric charge-point equipment. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                                example: '5000.99'
                              zeroEmissionsCarAllowance:
                                type: number
                                description: The amount of zero emissions car allowance. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                                example: '5000.99'
                              propertyIncomeAllowance:
                                type: number
                                description: The amount of tax exemption for individuals with income from land or property. The value must be between 0 and 1000.00 up to 2 decimal places.
                                minimum: 0
                                maximum: 1000
                                multipleOf: 0.01
                                example: '100.25'
                            additionalProperties: false
                        additionalProperties: false
                      foreignProperty:
                        type: array
                        description: Array holding the adjustments and allowances of the user's foreign property business - excluding Furnished Holiday Lettings (FHL) in the European Economic Area (EEA) for the period.
                        items:
                          type: object
                          properties:
