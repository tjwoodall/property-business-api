    put:
      security:
        - User-Restricted:
            - write:self-assessment
      summary: Amend a Foreign Property Income & Expenses Period Summary
      description: |
        This endpoint allows a developer to amend the income and expenses for a foreign property business.
        This submission is for either or both of Furnished Holiday Letting (FHL) in the European Economic Area (EEA) and all other foreign property submissions.
        In the case of Non-FHL Foreign Property, if there are multiple properties per country, the income and expenses should be the total across all properties.
        A National Insurance number, business ID, tax year and submission ID are required.

        <strong>Note: This endpoint only supports submissions up to tax year 2024-25. New endpoints which support cumulative submission
        are provided for tax year 2025-26 onwards</strong>.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario)    | Scenario                                                                                           |
        |-------------------------------------|----------------------------------------------------------------------------------------------------|
        | N/A - DEFAULT                       | Simulate success response.                                                                         |
        | NOT_FOUND                           | Simulates the scenario where no data is found.                                                     |
        | TYPE_OF_BUSINESS_INCORRECT          | Simulates the scenario where a businessId for something other than a foreign property is supplied. |
        | STATEFUL                            | Performs a stateful update.                                                                        |
      tags:
        - Income and Expenses Period Summaries
      parameters:
        - name: nino
          in: path
          description: National Insurance number, in the format `AA999999A`.
          schema: *ref_6
          required: true
        - name: businessId
          in: path
          description: |
            An identifier for the business, unique to the customer.<p>Must conform to the regular expression `^X[A-Z0-9]{1}IS[0-9]{11}$`
          schema: *ref_7
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. For example: 2022-23. The start year and end year must not span two tax years.
            The minimum tax year is 2022-23. No gaps are allowed, for example, 2022-24 is not valid.
            (The minimum tax year in Sandbox is 2021-22.)        
            Maximum tax year supported is 2024-25.
          schema: *ref_44
          required: true
        - name: submissionId
          in: path
          description: |
            An identifier for the income and expenditure period summary.<p>Must conform to the regular expression `^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$`
          schema: *ref_25
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_9
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: *ref_20
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: *ref_21
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_10
          required: false
