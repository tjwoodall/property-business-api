                                description: The amount of zero emissions car allowance. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                minimum: 0
                                maximum: 99999999999.99
                                multipleOf: 0.01
                                example: '5000.99'
                            additionalProperties: false
                        additionalProperties: false
