    put:
      security:
        - User-Restricted:
            - write:self-assessment
      summary: Create and Amend a Foreign Property Annual Submission
      description: |
        This endpoint enables you to re-submit adjustments and allowances for a foreign property business. 
        This submission is for either or both of Furnished Holiday Letting (FHL) in the European Economic Area (EEA) and Non-FHL Foreign Property submissions. 
        A National Insurance number, business ID and tax year must be provided.

        Note: For tax years before 2025-26, data can be submitted for either a Foreign FHL-EEA or Non-FHL property. 
        From tax year 2025-26 onwards, the Foreign FHL-EEA and Non-FHL property types are no longer valid and you must use the Foreign property type.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Tax Year        | Header Value (Gov-Test-Scenario) | Scenario                                                                                                    |
        |-----------------|----------------------------------|-------------------------------------------------------------------------------------------------------------|
        | 2025-26 onwards | N/A - DEFAULT                    | Simulates success response.                                                                                 |
        | 2025-26 onwards | NOT_FOUND                        | Simulates the scenario where no data is found.                                                              |
        | 2025-26 onwards | TYPE_OF_BUSINESS_INCORRECT       | Simulates the scenario where a businessId for something other than a foreign property is supplied.          |
        | 2025-26 onwards | PROPERTY_INCOME_ALLOWANCE        | Simulates the scenario where the propertyIncomeAllowance is submitted when privateUseAdjustment is supplied |
        | 2025-26 onwards | STATEFUL                         | Performs a stateful create or update.                                                                       |
        | 2025-26 onwards | OUTSIDE_AMENDMENT_WINDOW         | Simulates the scenario where request cannot be completed as it is outside the amendment window.             |
        | 2026-27 onwards | PROPERTY_ID_MISMATCH             | Simulates the scenario where the supplied property ID is not associated with the income source on record.   |
      tags:
        - Annual Submissions
      parameters:
        - name: nino
          in: path
          description: National Insurance number, in the format `AA999999A`.
          schema: *ref_6
          required: true
        - name: businessId
          in: path
          description: |
            An identifier for the business, unique to the customer.<p>Must conform to the regular expression `^X[A-Z0-9]{1}IS[0-9]{11}$`
          schema: *ref_7
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. For example: 2022-23. The start year and end year must not span two tax years. The minimum tax year is 2022-23. No gaps are allowed, for example, 2022-24 is not valid. (The minimum tax year in Sandbox is 2021-22.)
          schema: *ref_8
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_9
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: *ref_20
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: *ref_21
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_10
          required: false
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - $schema: http://json-schema.org/draft-04/schema#
                  title: For TY 2024-25 and before
                  type: object
                  properties:
                    foreignFhlEea:
                      type: object
                      description: Object holding the adjustments and allowances of the user's Furnished Holiday Lets in the European Economic Area for the period.
                      properties:
                        adjustments:
                          type: object
                          description: Object holding Foreign FHL EEA Property Adjustments.
                          properties:
                            privateUseAdjustment:
                              type: number
                              description: Any adjustments that are not solely for the property business. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '5000.99'
                            balancingCharge:
                              type: number
                              description: If an item for which capital allowance was claimed has been sold, given away or is no longer in use. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '5001.99'
