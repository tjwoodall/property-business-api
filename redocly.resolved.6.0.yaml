  /individuals/business/property/foreign/{nino}/{businessId}/period/{taxYear}/{submissionId}:
    get:
      security:
        - User-Restricted:
            - read:self-assessment
      summary: Retrieve a Foreign Property Income & Expenses Period Summary
      description: |
        This endpoint allows a developer to retrieve the income and expenses for a Foreign Property business, using the submission ID for either or both of Furnished Holiday Lettings (FHL) in the European Economic Area (EEA) and all other Foreign Property submissions. 
        A National Insurance number, business ID, and tax year are required.

        <strong>Note: This endpoint only supports submissions up to tax year 2024-25. New endpoints which support cumulative submission
        are provided for tax year 2025-26 onwards</strong>.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                                                 |
        |----------------------------------|--------------------------------------------------------------------------|
        | N/A - DEFAULT                    | Simulates the scenario where no data is found.                           |
        | FOREIGN_PROPERTY                 | Simulates success response with Foreign FHL and Non-FHL properties.      |
        | FOREIGN_FHL_FULL_EXPENSES        | Simulates success response with Foreign FHL property.                    |
        | FOREIGN_FHL_CONSOLIDATED         | Simulates the scenario of a FHL property with consolidated expenses.     |
        | FOREIGN_NON_FHL_FULL_EXPENSES    | Simulates success response with Foreign Non-FHL property.                |
        | FOREIGN_NON_FHL_CONSOLIDATED     | Simulates the scenario of a Non-FHL property with consolidated expenses. |
        | UK_PROPERTY                      | Simulates the scenario where wrong business type is returned.            |
        | STATEFUL                         | Performs a stateful retrieve.                                            |
      tags:
        - Income and Expenses Period Summaries
      parameters:
        - name: nino
          in: path
          description: National Insurance number, in the format `AA999999A`.
          schema: *ref_6
          required: true
        - name: businessId
          in: path
          description: |
            An identifier for the business, unique to the customer.<p>Must conform to the regular expression `^X[A-Z0-9]{1}IS[0-9]{11}$`
          schema: *ref_7
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. For example: 2022-23. The start year and end year must not span two tax years.
            The minimum tax year is 2022-23. No gaps are allowed, for example, 2022-24 is not valid.
            (The minimum tax year in Sandbox is 2021-22.)        
            Maximum tax year supported is 2024-25.
          schema: *ref_44
          required: true
        - name: submissionId
          in: path
          description: |
            An identifier for the income and expenditure period summary.<p>Must conform to the regular expression `^[0-9a-f]{8}-[0-9a-f]{4}-4[0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$`
          schema: *ref_25
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_9
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: *ref_24
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_10
          required: false
